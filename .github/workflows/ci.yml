name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint-and-test:
    name: Lint and Native Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (1.94.0)
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Tests
        run: cargo test -p leptos-column-browser --all-features

  wasm-check:
    name: WASM Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (1.94.0) with WASM target
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check library (WASM)
        run: cargo check -p leptos-column-browser --target wasm32-unknown-unknown

      - name: Check file_explorer example (WASM)
        run: |
          cd examples/file_explorer
          cargo check --target wasm32-unknown-unknown

      - name: Check api_navigator example (WASM)
        run: |
          cd examples/api_navigator
          cargo check --target wasm32-unknown-unknown

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (1.94.0)
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps --all-features -p leptos-column-browser

  msrv:
    name: MSRV Check (Rust 1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust 1.94.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check library at MSRV
        run: cargo check -p leptos-column-browser --all-features

      - name: Check WASM at MSRV
        run: cargo check -p leptos-column-browser --target wasm32-unknown-unknown
